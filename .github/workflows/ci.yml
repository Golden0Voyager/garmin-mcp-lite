name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check garmin_mcp_lite/ tests/

      - name: Run mypy
        run: uv run mypy garmin_mcp_lite/ || true
      - name: Run security scan (bandit)
        run: uv tool run bandit -r garmin_mcp_lite/ || true

      - name: Run dependency audit
        run: uv audit || true


      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing -k 'not test_get_client' tests/

      - name: Enforce coverage threshold
        run: uv run coverage report
